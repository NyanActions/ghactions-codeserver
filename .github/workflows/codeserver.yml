name: run codeserver
on: [push, workflow_dispatch]

jobs:
  codeserver:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install cloudflared
        run: |
          wget https://bin.equinox.io/c/VdrWdbjqyF/cloudflared-stable-linux-amd64.deb
          chmod 777 cloudflared-stable-linux-amd64.deb
          dpkg -i cloudflared-stable-linux-amd64.deb

      - name: Install codeserver
        run: curl -fsSL https://code-server.dev/install.sh | sh

      - name: run codeserver
        run: nohup code-server --port 13337 --auth none --disable-telemetry &
     
      - name: tunnel cloudflared
        run: cloudflared tunnel --url http://127.0.0.1:13337 --metrics localhost:45678
